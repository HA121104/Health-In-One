<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Health In One</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">HealthInOne</a>

      <div class="d-flex gap-2 flex-wrap">
        {% if user.is_authenticated %}
          <a class="btn btn-outline-light btn-sm" href="/dashboard/">Dashboard</a>
          <a class="btn btn-outline-light btn-sm" href="/log/">Log Metrics</a>
          <a class="btn btn-outline-light btn-sm" href="/history/">History</a>
          <a class="btn btn-outline-light btn-sm" href="/profile/">Profile</a>
          <a class="btn btn-outline-light btn-sm" href="/social/leaderboard/">Leaderboard</a>
          <a class="btn btn-warning btn-sm" href="/accounts/logout/">Logout</a>
        {% else %}
          <a class="btn btn-outline-light btn-sm" href="/accounts/login/">Login</a>
          <a class="btn btn-success btn-sm" href="/signup/">Sign up</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
