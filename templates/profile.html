{% extends "base.html" %}
{% block content %}
<div class="bg-white p-4 rounded shadow-sm">
  <h2 class="h4 mb-3">Your Profile</h2>
  <p class="text-muted">I use this to personalise targets (e.g., exercise and calories).</p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary">Save</button>
  </form>
</div>
{% endblock %}
