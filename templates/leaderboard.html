{% extends "base.html" %}
{% block content %}

<div class="bg-white p-4 rounded shadow-sm">
  <h2 class="h5">Leaderboard (7-day average)</h2>

  <table class="table">
    <thead>
      <tr>
        <th>Rank</th>
        <th>User</th>
        <th>Average Score</th>
      </tr>
    </thead>
    <tbody>
      {% for row in leaderboard %}
        <tr>
          <td>{{ forloop.counter }}</td>
          <td>{{ row.user__username }}</td>
          <td>{{ row.avg_score|floatformat:1 }}</td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="3">No data yet.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
